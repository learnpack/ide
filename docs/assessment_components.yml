version: "1.0.0"
components:
  - name: open_text_question
    description: >-
      The open text question is a type of interactive question where users can write down a text answer. The component consists in a markdown code block with the language set to `question` and has a metadata property eval in the metadata section of the code block with instructions on how to evaluate the answer. Inside the code block, you must write down 3-5 example answers with CORRECT: or INCORRECT: prefix. The actual question must be written before the code block so the user can see it.
    avoid:
      - multiple choice
      - true/false
      - fill in the blank
      - this component is intended only for free form answers
      - never use for visual questions
    props:
      - eval: string (required)
    example: |
      ### What is console.log in your own words?

      ```question eval="The user needs to write using its own words what is console.log"
      CORRECT: The console.log is a function that logs a message to the console.
      INCORRECT: It is used to solve logarithms problems.
      CORRECT: It prints things to the console.  
      ```
    rules:
      - MUST only require a textual answer that can be evaluated without images.
      - MUST NOT ask the learner to draw, sketch, diagram, circle, shade, underline, point, annotate, mark on paper, or `visualize and show`
      - MUST NOT include phrases such as `draw…`, `sketch…`, `diagram…`, `divide the shape and show…`, `mark the figure…`.
      - If the task is visual, convert to an explanatory `image` component or a numeric/text question (`fill_in_the_blank`, `multiple_choice_question`) instead.
      - Answers can be as short as 1 word or as long as a full paragraph.
      - Only use for textual easy to evaluate questions
      - Never use this component for reflection questions, only for knowledge assessment questions.

  - name: multiple_choice_question
    intendedUse:
      - evaluation
      - knowledge assessment
    measures:
      - rubric: content_mastery
        weight: 0.55
      - rubric: critical_thinking
        weight: 0.25
      - rubric: application_problem_solving
        weight: 0.20
    description: >-
      Quizzes or multiple choice questions are a great way to test the knowledge of the user. They are a great way to make the user think and to make the lesson more interactive. In LearnPack, the quizzes are rendered from task list syntax.

      ### Rules

      1. Each group of options should have a question that is a list item, numbered or not, separated by an empty line from the options.
      2. Each group of options must have an unique correct answer marked with [x]
      3. Each option should be a checkbox (task list item) indented by 3 to 6 spaces, this is important for the parsing from markdown to HTML.
      4. It must be an empty line between the question and the answers options. This is important for the parsing from markdown to HTML.
      5. Ignoring any rule from the above list will break the parsing from markdown to HTML and the quiz will not be rendered correctly.

    rules:
      - Avoid questions with multiple correct answers. Each question must have an unique correct answer.
      - Avoid questions with too many options. Each question should have between 3 and 5 options.
    goodFor:
      - reflection
      - explanation
      - recall
      - knowledge assessment
    
    example: |

      ### Put your knowledge to the test!

      Select the correct answer for each question.


      1. Question number 1 -> this is the question (can be numbered or not), it is a list item that starts at the beginning of the line
        <!-- Each group of options should have an empty line between the question and the options -->
        - [ ] Incorrect answer -> this is one of the incorrect answers
        - [ ] Incorrect answer -> this is one of the incorrect answers
        - [x] Correct answer -> this is the correct answer (is the only one that can be marked with [x])
        <!-- Note that each answer should be a task list item indented by 3 to 6 spaces. -->

      2. Question number 2
        <!-- Each group of options should have an empty line between the question and the options. Each option should be a task list item indented by 3 to 6 spaces. -->
        - [ ] Incorrect answer
        - [x] Correct answer
        - [ ] Incorrect answer


      --- Second Example ---

      - Question number 1

        - [x] Correct option
        - [ ] Incorrect option
        - [ ] Incorrect option

      - Question number 2

        - [ ] Incorrect option
        - [x] Correct option
        - [ ] Incorrect option

  - name: fill_in_the_blank
    measures:
      - rubric: content_mastery
        weight: 0.70
      - rubric: communication
        weight: 0.15
      - rubric: application_problem_solving
        weight: 0.15
    description: >-
      A fill in the blank is a component that allows the user to fill in the blank with the correct answer. It consists in a markdown code block with the language set to `fill_in_the_blank`. Inside the code block, you must write the question with the blank (or blanks) to be filled. Each blank consist in _1_, _2_, _3_, etc. In the metadata section, you must include the valid answers for each blank. The blanks are numbered starting from 1. Case insensitive answers are allowed. If multiple answer are allowed for a blank, you must include them separated by a comma in the proper metadata property. You can also use fill in the blank for numerical questions.
    avoid:
      - open text question
      - this component is intended only for fill in the blank answers
      - never use for visual questions
      - only for textual easy to evaluate questions
    example: |
      ### Let's recall!

      ```fill_in_the_blank 1="Paris" 2="Berlin"
      The capital of France is _1_, the capital of Germany is _2_.
      ```
      --- Second Example ---

      ### Are you really learning? Let's check it!

      Complete the sentence with number of hours of sleep per day that are recommended based on the lesson.

      ```fill_in_the_blank 1="7,8,9,10" 
      I need to sleep at least _1_ hours a day to be healthy.
      ```

      --- Third Example ---

      ### Let's check your math skills!

      ```fill_in_the_blank 1="12" 2="5" 3="4"
      Calculate the result of 2 * 6 = _1_
      If we divide 20 by 4, the result is _2_
      The square root of 16 is _3_
      ```

  - name: select_the_blank
    measures:
      - rubric: content_mastery
        weight: 0.70
      - rubric: communication
        weight: 0.15
      - rubric: application_problem_solving
        weight: 0.15
    description: >-
      A select the blank is a component where the user completes a sentence by choosing the correct option from a dropdown for each blank, instead of typing free text. Because the user picks from a predefined list, grading is fully deterministic: the user can never fail due to typos, punctuation, casing or incomplete answers, and the available options give the learner guidance. It consists in a markdown code block with the language set to `select_the_blank`. Inside the code block, you must write the question with the blank (or blanks) to be filled. Each blank consists in _1_, _2_, _3_, etc. In the metadata section, for each blank you must provide the list of options separated by the pipe character `|`. IMPORTANT: the FIRST option of each blank is the correct one. You MUST provide at least 3 options per blank: 1 correct answer and at least 2 plausible distractors. You can also use select the blank for numerical questions.
    rules:
      - The FIRST option of each blank is always the correct answer; the rest are distractors.
      - Each blank MUST have at least 3 options (1 correct + at least 2 distractors).
      - Options are separated by the pipe character `|`, NOT by commas (commas can be part of an option's text).
      - Distractors must be plausible and related to the topic, never obviously wrong.
      - Keep options reasonably short so they read well inside a dropdown.
    avoid:
      - free text answers (use open_text_question for those)
      - blanks with fewer than 3 options
      - never use for visual questions
    example: |
      ### Let's recall!

      ```select_the_blank 1="Paris|Madrid|Rome" 2="Berlin|Lisbon|Vienna"
      The capital of France is _1_, the capital of Germany is _2_.
      ```

      --- Second Example ---

      ### Are you really learning? Let's check it!

      ```select_the_blank 1="401 Unauthorized|403 Forbidden|404 Not Found" 2="GET|POST|DELETE" 3="POST|GET|PUT"
      If the user is not authenticated, the server responds with _1_.
      To retrieve a resource you use _2_, and to create a new one you use _3_.
      ```

  - name: ordering
    measures:
      - rubric: content_mastery
        weight: 0.60
      - rubric: application_problem_solving
        weight: 0.25
      - rubric: critical_thinking
        weight: 0.15
    description: >-
      An ordering component asks the user to arrange a set of items into the correct sequence. It is ideal for processes, step-by-step procedures, chronological events, or ranking things (for example: the lifecycle of an HTTP request, the steps of a git workflow, or ordering numbers from smallest to largest). Grading is fully deterministic: the user's order is compared position by position with the correct one. It consists in a markdown code block with the language set to `ordering`. Inside the code block, write one item per line, IN THE CORRECT ORDER (the renderer shuffles them before showing them to the user, and the user reorders them with up/down arrows). You can optionally add a `title` in the metadata to describe what must be ordered.
    rules:
      - Write the items in the CORRECT order inside the code block; the renderer shuffles them automatically.
      - Write exactly one item per line. Items may optionally start with a number or a list marker (it is stripped automatically).
      - Use between 3 and 6 items; fewer than 3 makes the exercise trivial, more than 6 becomes tedious.
      - There must be a single, unambiguous correct order. Do not use it when several orders could be valid.
      - Keep each item short and self-contained.
    avoid:
      - sets where more than one order is acceptable
      - fewer than 3 items
      - never use for visual questions
    example: |
      ### Let's order the process!

      ```ordering title="Order the lifecycle of an HTTP request"
      The client opens a TCP connection
      The client sends the request
      The server processes the request and responds
      The connection is closed
      ```

      --- Second Example ---

      ### Can you sort these numbers?

      ```ordering title="Sort the numbers from smallest to largest"
      2
      7
      15
      42
      ```

  - name: code_challenge_proposal
    intendedUse:
      - hands-on learning
      - code experimentation
      - this will render an acceptable component for the teacher, so the teacher can generate a coding challenge for the student
      - The student will see all the files from the lessons
      - So you need to suggest as many files as needed for the exercise inside the code challenge proposal code block.
    description: >-
      A code file proposal is a component the teacher will use to generate some coding files used to solve an exercise in the instructions, it consists in a markdown code block with the language set to `code_challenge_proposal`. Inside the code block, you must explain what the student needs to do in the exercise in at most 20 sentences. You need to explain the files that will be generated and the instructions for the student to complete the exercise. Use this component ALL the TIME that the lesson is of type code or requires a code editor.
    rules:
      - The main file must be always be named app.extension, where extension is the extension of the file, for example, app.js, app.html, app.css, etc.
      - Keep challenges simple and easy to understand for the student, it must be related to the lesson content and the exercise instructions.
    avoid:
      - complex code that might not be inferred correctly by an AI model
    example: |
      ```code_challenge_proposal 
      In this exercise, the student needs to complete a function "multiply" that multiplies two numbers and print the result to the console. This exercise required an app.js where the student will write the code to complete the function. The app.js will contain a skeleton of the function to be completed.
      ```

      ```code_challenge_proposal
      In this exercise, the student needs to create a simple index.html page with a title and a paragraph. This page is linked to the app.css file with basic styling. The HTML files contains a heading but is missing the paragraph. The styles contain the rules for two id: #title and #paragraph, but the student needs to add the ids to the correct elements in the HTML file.
      ```
